<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduVoice AI | Intelligent Learning Assistant</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --accent-bg: #f1f5f9;
      --sidebar-width: 280px;
      --danger: #ef4444;
      --modal-overlay: rgba(15, 23, 42, 0.4);
    }

    [data-theme="dark"] {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --accent-bg: #0f172a;
      --danger: #f87171;
      --modal-overlay: rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.2s, color 0.2s;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--card-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-new-chat {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .btn-new-chat:hover { background-color: var(--primary-hover); }

    .chat-history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      background-color: var(--accent-bg);
      border: 1px solid var(--border-color);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }

    .history-item:hover { opacity: 0.9; }
    
    .history-item.active {
      border-color: var(--primary);
      background-color: var(--accent-bg);
      color: var(--primary);
      font-weight: 600;
    }

    .history-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .btn-delete-item {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .btn-delete-item:hover { color: var(--danger); }

    /* Bottom Sidebar Actions (Settings & Auth) */
    .sidebar-footer {
      border-top: 1px solid var(--border-color);
      padding-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .footer-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--accent-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }

    .footer-btn:hover { background-color: var(--border-color); }

    .avatar-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--border-color);
      font-size: 12px;
    }

    /* Main Area */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      justify-content: center;
    }

    .app-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 820px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
      padding: 32px;
      height: fit-content;
    }

    .header { margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-main);
      background-color: var(--card-bg);
    }

    textarea { resize: vertical; min-height: 80px; }

    .voice-controls-row {
      display: flex;
      gap: 8px;
    }

    .prompt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .btn-text {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
    }

    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .chip {
      background-color: var(--accent-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
    }

    .file-input-wrapper input[type="file"] { padding: 6px; }

    .btn-primary {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-primary:hover { background-color: var(--primary-hover); }

    .audio-controls { display: flex; gap: 8px; }

    .btn-audio {
      background-color: var(--accent-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      min-width: 80px;
      text-align: center;
    }

    .response-container {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }

    .response-box {
      background-color: var(--accent-bg);
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      min-height: 80px;
      white-space: pre-wrap;
    }

    .status-text { color: var(--text-muted); font-style: italic; }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--modal-overlay);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title { font-weight: 700; font-size: 16px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <button class="btn-new-chat" onclick="startNewChat()">+ New Chat</button>
    <div class="sidebar-header">
      <span class="sidebar-title">Saved History</span>
      <button class="btn-text" onclick="clearAllHistory()">Clear All</button>
    </div>
    <div id="historyList" class="chat-history-list"></div>

    <div class="sidebar-footer">
      <button class="footer-btn" onclick="openSettingsModal()">
        ⚙️ Settings
      </button>

      <button id="authBtn" class="footer-btn" onclick="handleAuthClick()">
        <span id="userAvatar" class="avatar-icon">👤</span>
        <span id="userName">Sign in with Google</span>
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="app-card">
      <div class="header">
        <h1>Interactive Learning Assistant</h1>
        <p>Tailor your tutor by grade, subject, persona, language, and voice preferences.</p>
      </div>

      <div class="grid-3">
        <div class="form-group">
          <label for="apiKey">Groq API Key</label>
          <input type="password" id="apiKey" placeholder="gsk_..." />
        </div>

        <div class="form-group">
          <label for="gradeLevel">Grade Level</label>
          <select id="gradeLevel">
            <option value="Middle School">Middle School (6th-8th)</option>
            <option value="High School" selected>High School (9th-12th)</option>
            <option value="Undergraduate">Undergraduate (College)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" onchange="updateRecommendedPrompts()">
            <option value="Science">Science</option>
            <option value="Math">Math</option>
            <option value="English">English</option>
            <option value="History">History</option>
            <option value="Computer Science: [">Computer Science: [</option>
          </select>
        </div>
      </div>

      <div class="grid-3">
        <div class="form-group">
          <label for="langSelect">Voice Language</label>
          <select id="langSelect" onchange="filterVoiceList()">
            <option value="all">All Languages</option>
            <option value="en" selected>English</option>
            <option value="es">Spanish (Español)</option>
            <option value="fr">French (Français)</option>
            <option value="de">German (Deutsch)</option>
            <option value="ja">Japanese (日本語)</option>
            <option value="zh">Chinese (中文)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="genderSelect">Voice Gender Filter</label>
          <select id="genderSelect" onchange="filterVoiceList()">
            <option value="all" selected>All Genders</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
          </select>
        </div>

        <div class="form-group">
          <label for="persona">Teaching Style</label>
          <select id="persona">
            <option value="high_school">Encouraging Tutor</option>
            <option value="professor">Strict Academic Professor</option>
            <option value="socratic">Socratic Questioning</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="voiceSelect">Selected Voice Engine</label>
        <div class="voice-controls-row">
          <select id="voiceSelect" onchange="onVoiceChanged()"></select>
          <button class="btn-audio" onclick="testVoice()">🔊 Test</button>
        </div>
      </div>

      <div class="form-group">
        <div class="prompt-header">
          <label>Recommended Questions</label>
          <button class="btn-text" onclick="updateRecommendedPrompts()">🔄 Shuffle Prompts</button>
        </div>
        <div id="chipsContainer" class="chips-container"></div>
      </div>

      <div class="form-group file-input-wrapper">
        <label for="fileInput">Attach Image or Document (Optional)</label>
        <input type="file" id="fileInput" accept="image/*,.txt,.js,.py,.html,.css,.json,.md" />
      </div>

      <div class="form-group">
        <label for="userQuery">Question (Press Enter to Send)</label>
        <textarea id="userQuery" placeholder="Type your question or click a recommended prompt... (Shift+Enter for new line)"></textarea>
      </div>

      <button id="submitBtn" class="btn-primary" onclick="generateAndSpeak()">Ask Assistant</button>

      <div class="response-container">
        <div class="prompt-header">
          <label>Tutor Response</label>
          <div class="audio-controls">
            <button id="playPauseBtn" class="btn-audio" onclick="togglePlayPause()">▶ Play</button>
            <button class="btn-audio" onclick="stopAudio()">⏹ Stop</button>
          </div>
        </div>
        <div id="output" class="response-box">
          <span class="status-text">Your generated response will appear here...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Theme Settings</span>
        <button class="btn-text" onclick="closeSettingsModal()">✕</button>
      </div>
      <div class="form-group">
        <label for="themeSelect">Appearance</label>
        <select id="themeSelect" onchange="applyTheme(this.value)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="system">System Default</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    /* Replace with your actual Google Client ID from Google Cloud Console */
    const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com";

    /* State Variables */
    let allSystemVoices = [];
    let filteredVoices = [];
    let currentChatId = null;

    let speechQueue = [];
    let currentSpeechIndex = 0;
    let isSpeaking = false;
    let isPaused = false;

    let googleUser = null;
    let tokenClient = null;

    const promptBank = {
      Science: [
        "How does photosynthesis convert sunlight into energy?",
        "Explain the difference between mitosis and meiosis.",
        "What causes gravitational pull in space?",
        "How do acids and bases react chemically?"
      ],
      Math: [
        "Explain the Pythagorean theorem with a real-world example.",
        "What is a derivative in calculus and why is it useful?",
        "How do probability and statistics differ?",
        "Explain quadratic equations simply."
      ],
      English: [
        "What is the difference between active and passive voice?",
        "How do authors use symbolism in literature?",
        "Explain the structure of a standard 5-paragraph essay.",
        "What is the purpose of a thesis statement?"
      ],
      History: [
        "What were the primary causes of World War I?",
        "Explain the impact of the Industrial Revolution.",
        "How did the Silk Road shape global trade?",
        "What was the significance of the Magna Carta?"
      ],
      "Computer Science: [": [
        "Explain the difference between arrays and linked lists.",
        "How does binary code represent numbers and text?",
        "What is the concept of Object-Oriented Programming?",
        "How do search engine algorithms index web pages?"
      ]
    };

    const personas = {
      high_school: "You are an encouraging tutor. Explain concepts clearly using simple, relatable analogies.",
      professor: "You are a university professor. Provide structured, academic explanations with technical accuracy.",
      socratic: "You are a Socratic tutor. Answer concisely, then ask a thoughtful follow-up question to promote critical thinking."
    };

    window.onload = function() {
      initTheme();
      loadSystemVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadSystemVoices;
      }
      updateRecommendedPrompts();
      renderSidebarHistory();
      initGoogleAuth();

      document.getElementById('userQuery').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          generateAndSpeak();
        }
      });
    };

    /* Theme Engine */
    function initTheme() {
      const savedTheme = localStorage.getItem('eduVoiceTheme') || 'system';
      document.getElementById('themeSelect').value = savedTheme;
      applyTheme(savedTheme);

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (localStorage.getItem('eduVoiceTheme') === 'system') {
          applyTheme('system');
        }
      });
    }

    function applyTheme(theme) {
      localStorage.setItem('eduVoiceTheme', theme);
      if (theme === 'system') {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }
    }

    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }

    /* Improved Google Auth Popup + Demo Fallback */
    function initGoogleAuth() {
      if (window.google && GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com") {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
          callback: (response) => {
            if (response.access_token) {
              fetchGoogleProfile(response.access_token);
            }
          },
        });
      }
    }

    function handleAuthClick() {
      if (googleUser) {
        if (confirm("Sign out of your account?")) {
          googleUser = null;
          document.getElementById('userName').innerText = "Sign in with Google";
          document.getElementById('userAvatar').innerHTML = "👤";
        }
      } else if (tokenClient) {
        tokenClient.requestAccessToken();
      } else {
        // Fallback demo sign-in for testing without a Google Cloud Key
        googleUser = {
          name: "Demo Student",
          picture: "https://api.dicebear.com/7.x/bottts/svg?seed=EduUser"
        };
        document.getElementById('userName').innerText = googleUser.name;
        document.getElementById('userAvatar').innerHTML = `<img src="${googleUser.picture}" class="avatar-icon" alt="Profile" />`;
      }
    }

    async function fetchGoogleProfile(token) {
      try {
        const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const profile = await res.json();
        googleUser = profile;
        document.getElementById('userName').innerText = profile.name;
        document.getElementById('userAvatar').innerHTML = `<img src="${profile.picture}" class="avatar-icon" alt="Profile" />`;
      } catch (err) {
        console.error("Failed to load Google profile", err);
      }
    }

    /* Voice Filtering & Saved Persistence Logic */
    function loadSystemVoices() {
      if ('speechSynthesis' in window) {
        allSystemVoices = window.speechSynthesis.getVoices();
        filterVoiceList();
      }
    }

    function filterVoiceList() {
      const selectedLang = document.getElementById('langSelect').value;
      const selectedGender = document.getElementById('genderSelect').value;
      const voiceSelect = document.getElementById('voiceSelect');

      filteredVoices = allSystemVoices.filter(voice => {
        const langMatches = selectedLang === 'all' || voice.lang.toLowerCase().startsWith(selectedLang);
        const name = voice.name.toLowerCase();
        let genderMatches = true;

        if (selectedGender === 'female') {
          genderMatches = name.includes('female') || name.includes('zira') || name.includes('samantha') || name.includes('victoria') || name.includes('karen') || name.includes('fiona') || name.includes('kyoko');
        } else if (selectedGender === 'male') {
          genderMatches = name.includes('male') || name.includes('david') || name.includes('alex') || name.includes('george') || name.includes('daniel') || name.includes('otoya');
        }

        return langMatches && genderMatches;
      });

      if (filteredVoices.length === 0) {
        filteredVoices = allSystemVoices.filter(v => selectedLang === 'all' || v.lang.toLowerCase().startsWith(selectedLang));
      }

      voiceSelect.innerHTML = '';
      const savedVoiceURI = localStorage.getItem('eduVoiceSelectedURI');
      let savedIndexToSelect = 0;

      filteredVoices.forEach((voice, idx) => {
        const option = document.createElement('option');
        option.textContent = `${voice.name} (${voice.lang})`;
        option.value = idx;
        if (savedVoiceURI && voice.voiceURI === savedVoiceURI) {
          savedIndexToSelect = idx;
        }
        voiceSelect.appendChild(option);
      });

      if (filteredVoices.length > 0) {
        voiceSelect.value = savedIndexToSelect;
        onVoiceChanged();
      }
    }

    function getSelectedVoice() {
      const savedURI = localStorage.getItem('eduVoiceSelectedURI');
      if (savedURI && allSystemVoices.length > 0) {
        const match = allSystemVoices.find(v => v.voiceURI === savedURI);
        if (match) return match;
      }
      const selectIndex = document.getElementById('voiceSelect').value;
      return filteredVoices[selectIndex] || allSystemVoices[0] || null;
    }

    function onVoiceChanged() {
      const selectIndex = document.getElementById('voiceSelect').value;
      const activeVoice = filteredVoices[selectIndex];

      if (activeVoice) {
        localStorage.setItem('eduVoiceSelectedURI', activeVoice.voiceURI);
      }

      if (isSpeaking) {
        const rawText = document.getElementById('output').innerText;
        stopAudio();
        speakText(rawText);
      }
    }

    function testVoice() {
      stopAudio();
      const voiceToUse = getSelectedVoice();
      const utterance = new SpeechSynthesisUtterance("Hi, I am your AI learning assistant.");
      if (voiceToUse) utterance.voice = voiceToUse;
      window.speechSynthesis.speak(utterance);
    }

    /* Queue Speech Engine */
    function speakText(text) {
      stopAudio();

      if (!('speechSynthesis' in window) || !text) return;

      speechQueue = text.match(/[^.!?]+[.!?]+/g) || [text];
      currentSpeechIndex = 0;
      isSpeaking = true;
      isPaused = false;

      document.getElementById('playPauseBtn').innerText = "⏸ Pause";
      processSpeechQueue();
    }

    function processSpeechQueue() {
      if (!isSpeaking || currentSpeechIndex >= speechQueue.length) {
        stopAudio();
        return;
      }

      const utterance = new SpeechSynthesisUtterance(speechQueue[currentSpeechIndex]);
      const voiceToUse = getSelectedVoice();
      if (voiceToUse) utterance.voice = voiceToUse;

      utterance.rate = 0.95;

      utterance.onend = () => {
        if (isSpeaking && !isPaused) {
          currentSpeechIndex++;
          processSpeechQueue();
        }
      };

      utterance.onerror = () => { stopAudio(); };

      window.speechSynthesis.speak(utterance);
    }

    function togglePlayPause() {
      const btn = document.getElementById('playPauseBtn');

      if (!isSpeaking && !isPaused) {
        const text = document.getElementById('output').innerText;
        if (text && !text.includes("Your generated response")) {
          speakText(text);
        }
        return;
      }

      if (isPaused) {
        isPaused = false;
        btn.innerText = "⏸ Pause";
        window.speechSynthesis.resume();
      } else {
        isPaused = true;
        btn.innerText = "▶ Play";
        window.speechSynthesis.pause();
      }
    }

    function stopAudio() {
      window.speechSynthesis.cancel();
      speechQueue = [];
      currentSpeechIndex = 0;
      isSpeaking = false;
      isPaused = false;
      document.getElementById('playPauseBtn').innerText = "▶ Play";
    }

    /* Prompt Handling */
    function updateRecommendedPrompts() {
      const subject = document.getElementById('subject').value;
      const container = document.getElementById('chipsContainer');
      container.innerHTML = '';

      const prompts = promptBank[subject] || promptBank.Science;
      const shuffled = [...prompts].sort(() => 0.5 - Math.random());

      shuffled.slice(0, 3).forEach(promptText => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.innerText = promptText;
        btn.onclick = () => document.getElementById('userQuery').value = promptText;
        container.appendChild(btn);
      });
    }

    async function processAttachedFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        if (file.type.startsWith('image/')) {
          reader.onload = () => resolve({ type: 'image', data: reader.result });
          reader.readAsDataURL(file);
        } else {
          reader.onload = () => resolve({ type: 'text', data: reader.result });
          reader.readAsText(file);
        }
        reader.onerror = err => reject(err);
      });
    }

    /* API Logic */
    async function generateAndSpeak() {
      const apiKey = document.getElementById('apiKey').value.trim();
      let query = document.getElementById('userQuery').value.trim();
      const grade = document.getElementById('gradeLevel').value;
      const subject = document.getElementById('subject').value;
      const personaKey = document.getElementById('persona').value;
      const fileInput = document.getElementById('fileInput');
      const outputDiv = document.getElementById('output');
      const submitBtn = document.getElementById('submitBtn');

      if (!apiKey) { alert("Please enter your Groq API key."); return; }
      if (!query && fileInput.files.length === 0) { alert("Please enter a question or attach a file."); return; }

      submitBtn.disabled = true;
      submitBtn.innerText = "Thinking...";
      outputDiv.innerHTML = '<span class="status-text">Thinking...</span>';

      const systemPrompt = `${personas[personaKey]} Target Grade Level: ${grade}. Subject Area: ${subject}. Format responses clearly.`;

      let modelName = "qwen/qwen3.6-27b";
      let userMessageContent = query;

      if (fileInput.files.length > 0) {
        try {
          const fileData = await processAttachedFile(fileInput.files[0]);
          if (fileData.type === 'image') {
            userMessageContent = [
              { type: "text", text: query || "Analyze this image." },
              { type: "image_url", image_url: { url: fileData.data } }
            ];
          } else if (fileData.type === 'text') {
            userMessageContent = `${query}\n\n[Attached Content]:\n${fileData.data}`;
          }
        } catch (err) {
          alert("Error processing file: " + err.message);
          submitBtn.disabled = false;
          submitBtn.innerText = "Ask Assistant";
          return;
        }
      }

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: modelName,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userMessageContent }
            ],
            temperature: 0.6
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const aiText = data.choices[0].message.content;
        outputDiv.innerText = aiText;

        speakText(aiText);
        saveToHistory(query || "Image Analysis", aiText, grade, subject);

        fileInput.value = "";

      } catch (error) {
        outputDiv.innerText = "Error: " + error.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Ask Assistant";
      }
    }

    /* History Management */
    function saveToHistory(question, answer, grade, subject) {
      let history = JSON.parse(localStorage.getItem('eduVoiceChats')) || [];
      const chatItem = {
        id: Date.now(),
        title: question,
        answer: answer,
        grade: grade,
        subject: subject
      };

      history.unshift(chatItem);
      localStorage.setItem('eduVoiceChats', JSON.stringify(history));
      currentChatId = chatItem.id;
      renderSidebarHistory();
    }

    function renderSidebarHistory() {
      const historyList = document.getElementById('historyList');
      const history = JSON.parse(localStorage.getItem('eduVoiceChats')) || [];

      if (history.length === 0) {
        historyList.innerHTML = '<span class="status-text" style="font-size:12px;">No chats saved.</span>';
        return;
      }

      historyList.innerHTML = history.map(chat => `
        <div class="history-item ${chat.id === currentChatId ? 'active' : ''}" onclick="loadChat(${chat.id})">
          <span class="history-title">${escapeHtml(chat.title)}</span>
          <button class="btn-delete-item" onclick="deleteSingleChat(event, ${chat.id})" title="Delete Chat">🗑</button>
        </div>
      `).join('');
    }

    function deleteSingleChat(event, id) {
      event.stopPropagation();
      let history = JSON.parse(localStorage.getItem('eduVoiceChats')) || [];
      history = history.filter(chat => chat.id !== id);
      localStorage.setItem('eduVoiceChats', JSON.stringify(history));

      if (currentChatId === id) {
        startNewChat();
      } else {
        renderSidebarHistory();
      }
    }

    function loadChat(id) {
      const history = JSON.parse(localStorage.getItem('eduVoiceChats')) || [];
      const chat = history.find(c => c.id === id);

      if (chat) {
        currentChatId = chat.id;
        document.getElementById('userQuery').value = chat.title;
        document.getElementById('output').innerText = chat.answer;
        document.getElementById('gradeLevel').value = chat.grade;
        document.getElementById('subject').value = chat.subject;
        renderSidebarHistory();
      }
    }

    function startNewChat() {
      currentChatId = null;
      document.getElementById('userQuery').value = '';
      document.getElementById('fileInput').value = '';
      document.getElementById('output').innerHTML = '<span class="status-text">Your generated response will appear here...</span>';
      stopAudio();
      renderSidebarHistory();
    }

    function clearAllHistory() {
      localStorage.removeItem('eduVoiceChats');
      startNewChat();
    }

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>
